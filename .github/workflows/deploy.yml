name: Build and Deploy Web Apps

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 318890247225.dkr.ecr.ap-south-1.amazonaws.com
  EKS_CLUSTER: pharmabag-cluster
  K8S_NAMESPACE: pharmabag
  NEXT_PUBLIC_API_BASE_URL: https://api.pharmabag.in/api
  NEXT_PUBLIC_API_URL: https://api.pharmabag.in/api

jobs:
  build-and-deploy:
    name: Build & Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [seller, buyer, admin]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          IMAGE=$ECR_REGISTRY/pharmabag-${{ matrix.app }}
          TAG=${{ steps.vars.outputs.image_tag }}
          docker build \
            --build-arg APP_NAME=${{ matrix.app }} \
            --build-arg NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL \
            --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL \
            -t $IMAGE:$TAG \
            -t $IMAGE:latest .
          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Update deployment image
        run: |
          IMAGE=$ECR_REGISTRY/pharmabag-${{ matrix.app }}:${{ steps.vars.outputs.image_tag }}
          kubectl set image deployment/pharmabag-${{ matrix.app }} \
            pharmabag-${{ matrix.app }}=$IMAGE -n $K8S_NAMESPACE

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/pharmabag-${{ matrix.app }} \
            -n $K8S_NAMESPACE --timeout=5m
